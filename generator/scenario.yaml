# ── Event Volume Tuning ──────────────────────────────────────────
volume:
  badge_events_per_hour_normal: 50
  badge_events_per_hour_party: 80
  badge_events_per_hour_takeover: 40
  door_events_per_hour: 60
  hvac_readings_interval_minutes: 5
  vault_system_checks_per_hour: 4
  security_events_per_hour_normal: 8
  security_events_per_hour_fbi: 25

  # ── Party guest crowd (Phase 6a / v2.9) ────────────────────────
  # Seal 2 ("Hostage Floor") expects floor 30 to be the busiest
  # floor (by `dc(badge_id)`) during the 20:00–22:00 party window.
  # The legacy generator only emitted ~50 random badge events split
  # across [1, 15, 20, 30] which made that ranking unreliable as
  # soon as the v2.9 NPC baseline gave other floors comparable
  # distinct-badge volume.
  #
  # Solution: a dedicated party-guest roster of synthetic attendees
  # who badge in (lobby → 30) at party start, swipe across floor 30
  # rooms during the party, and leave. Booth mode also runs this so
  # the puzzle is solvable in the curated 5-min subset.
  party_guest_count: 47            # distinct attendees at the Christmas party
                                   # (47 also matches Hans's "47 employees on-site"
                                   # narrative beat for Discovery 1.1)
  party_guest_swipes_per_attendee: 4   # lobby in + 2 floor-30 moves + lobby out (avg)
  party_overflow_floor_15_pct: 12  # ≈ % of guests who detour through Trading Floor
  party_overflow_floor_20_pct: 8   # ≈ % of guests who detour through Finance suite

  # ── NPC baseline (Phase 6 / v2.9) ──────────────────────────────
  # Defines the pre-heist activity window so SPL queries see a real
  # corporate rhythm. Total event budget targets ~50k by emitting:
  #   - per-NPC daily badge swipes (entry, internal moves, lunch, exit)
  #   - cleaning-crew floor-by-floor sweeps each weeknight
  #   - 24/7 security patrol checkpoints
  #   - sporadic vendor loading-dock visits
  # Booth mode (`--booth-mode`) skips this entire block.
  npc_baseline_window_hours: 168    # Dec 17 18:00 → Dec 24 18:00 (a full work week before the heist)
  npc_workdays_only: false          # if true, day-shift only emits Mon–Fri (we leave Sat/Sun in for richer dataset)
  npc_target_events_total: 50000    # advisory ceiling; actual count depends on roster + window
  npc_per_person_daily_swipes: 26   # entry + ~16 internal + lunch + ~7 misc + exit (averaged)
  npc_security_checkpoints_per_hour: 28   # roughly one patrol checkpoint every 2 minutes per active guard
  npc_cleaning_swipes_per_floor: 6
  npc_vendor_visits_per_day: 14
  # When true (default), every NPC badge swipe also emits a paired
  # door event to the same room — doubles the access event volume
  # without adding new "people" to the dataset. Booth mode skips
  # this whole subsystem either way.
  npc_emit_paired_door_event: true

