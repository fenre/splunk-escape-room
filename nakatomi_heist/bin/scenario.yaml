# ── Building ─────────────────────────────────────────────────────
building:
  name: Nakatomi Plaza
  floors:
    - { number: "B2",   name: "Parking Level 2",        group: basement,  restricted: false }
    - { number: "B1",   name: "Vault Level",            group: basement,  restricted: true }
    - { number: 1,      name: "Main Lobby",             group: lobby,     restricted: false }
    - { number: 2,      name: "Mail Room / Loading",    group: lower,     restricted: false }
    - { number: 3,      name: "Building Maintenance",   group: lower,     restricted: false }
    - { number: 5,      name: "Legal / Compliance",     group: lower,     restricted: false }
    - { number: 10,     name: "Human Resources",        group: mid,       restricted: false }
    - { number: 15,     name: "International Trade",    group: mid,       restricted: false }
    - { number: 20,     name: "Finance",                group: upper,     restricted: false }
    - { number: 25,     name: "R&D / Tech",             group: upper,     restricted: true }
    - { number: 28,     name: "Executive Support",      group: upper,     restricted: true }
    - { number: 30,     name: "Executive Suite / Event", group: upper,    restricted: true }
    - { number: 35,     name: "CEO / Board",            group: penthouse, restricted: true }
    - { number: "roof", name: "Mechanical / Helipad",   group: roof,      restricted: true }

# ── Event Volume Tuning ──────────────────────────────────────────
volume:
  badge_events_per_hour_normal: 50
  badge_events_per_hour_party: 80
  badge_events_per_hour_takeover: 40
  door_events_per_hour: 60
  hvac_readings_interval_minutes: 5
  vault_system_checks_per_hour: 4
  security_events_per_hour_normal: 8
  security_events_per_hour_fbi: 25

# ── Red Herrings ─────────────────────────────────────────────────
red_herrings:
  seal_1:
    - badge_id: MAINT-007
      floor: 1
      room: Security Office
      action: swipe
      time_offset_minutes: -150
      detail: "routine security check"
    - badge_id: SE-0012
      floor: 1
      room: Main Entrance
      action: swipe
      time_offset_minutes: 5
      detail: "post-takeover badge used by unknown"
    - badge_id: HE-3301
      floor: 1
      room: Parking Garage Entry
      action: attempt
      outcome: deny
      time_offset_minutes: -5
      detail: "badge not valid for this entrance after hours"

  seal_2:
    - floor: 35
      detail: "Late executive work session — quarterly report review"
    - floor: 30
      room: Conference Room A
      detail: "Christmas party catering delivery confirmed"
    - floor: 25
      detail: "vault HVAC inspection — nominal"

  seal_3:
    - session_id: VS-0038
      user: system
      inputs: ["0", "0", "0", "0"]
      detail: "automated maintenance test"
    - session_id: VS-0040
      user: ellis
      inputs: ["1", "2", "3", "4"]
      detail: "unauthorized access attempt"
    - session_id: VS-0041
      user: hans
      inputs: ["****"]
      detail: "session aborted by operator"

  seal_4:
    - encoded_message_rot13: "HUMIDITY CALIBRATION COMPLETE"
      floor: 20
    - encoded_message_rot13: "FILTER REPLACED ZONE 4"
      floor: 15
    - encoded_message_rot13: "ANNUAL INSPECTION DUE 2026-01-15"
      floor: 10
    - event: elevator_call
      floor: roof
      detail: "service_code: E-4401"

  seal_5:
    - channel: freq_12
      message: "LAPD TAC-3 // AUTH:9901 // SWAT STAGING CONFIRMED"
    - channel: freq_14
      message: "FBI FIELD CMD // ALL UNITS HOLD POSITION"
    - channel: freq_14
      message: "FBI FIELD CMD // REF:5765-A // ACKNOWLEDGE"
    - channel: freq_16
      message: "LAFD COMMAND // AUTH:3388 // HAZMAT STANDBY"
    - channel: freq_14
      message: "FBI FIELD CMD // HELICOPTER ETA 10 MINUTES"

  seal_6:
    - badge_id: NP-4471
      clearance: LEVEL-3
      note: "Similar badge number, different person"
    - badge_id: JT-0001
      clearance: LEVEL-6
      status: terminated
      note: "CEO badge — terminated tonight"

# ── Output ───────────────────────────────────────────────────────
output:
  directory: "output"
  format: "json"
  files:
    - filename: "nakatomi_access.json"
      index: nakatomi_access
      sourcetypes:
        - "nakatomi:access:badge"
        - "nakatomi:access:door"
    - filename: "nakatomi_vault.json"
      index: nakatomi_vault
      sourcetypes:
        - "nakatomi:vault:attempt"
        - "nakatomi:vault:system"
    - filename: "nakatomi_building.json"
      index: nakatomi_building
      sourcetypes:
        - "nakatomi:building:hvac"
        - "nakatomi:building:security"
  lookups:
    - filename: "floor_directory.csv"
    - filename: "employee_directory.csv"
    - filename: "system_codes.csv"
