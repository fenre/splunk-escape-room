# ────────────────────────────────────────────────────────────────────────────
# Nakatomi Heist — Saved Searches & Alerts
# ────────────────────────────────────────────────────────────────────────────
# v2.4.0: All three "Vault Alert" searches are now SCHEDULED so narrative
# clues land on the player's "Triggered Alerts" page during live booth play.
#
# Design choices:
#   - cron_schedule = */5 * * * *   → every 5 minutes (booth-cadence friendly)
#   - alert.suppress = 1, period 3600s  → at most one alert per hour per def,
#                                         enough hint cadence for one team,
#                                         not enough to spam the alerts page
#                                         when several teams cycle through.
#   - dispatch.earliest_time = -24h@h  → kept wide so alerts still fire even
#                                         on apps that haven't run the
#                                         generator in the last 5 min (lab/
#                                         demo installs)
#   - is_scheduled = 1 + enableSched = 1 + disabled = 0  → enabled on every
#                                         supported Splunk version.
#
# Operators who want tighter session-relevant alerts can override these
# fields in local/savedsearches.conf — never edit default/ post-install.
# ────────────────────────────────────────────────────────────────────────────

[Vault Alert - Unauthorized Access Pattern Detected]
search = index=nakatomi_access action=override floor!=1 | stats count by floor, badge_id | where count > 3 | eval clue="VAULT CLUE: Multiple override attempts on floor ".floor." — the access code pattern ends in the last two digits of the badge_id."
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
disabled = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 3600s
description = Detects unauthorized access patterns and provides a vault clue in the results. Players should check Triggered Alerts to find hidden codes.

[Vault Alert - Encrypted Radio Intercept]
search = index=nakatomi_comms channel=freq_14 | head 5 | eval decoded_clue="INTERCEPTED: The FBI authorization sequence for power grid override is embedded in the AUTH field. Extract it with: rex field=message \"AUTH:(?<auth_code>\\d+)\""
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
disabled = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 3600s
description = Intercepts FBI radio traffic and provides a decoding hint. Players checking triggered alerts will find guidance for extracting authorization codes.

[Vault Alert - Suspicious HVAC Anomaly]
search = index=nakatomi_building sourcetype="nakatomi:building:hvac" floor=roof | stats avg(value) as avg_temp, max(value) as max_temp, count as readings | eval alert_msg="HVAC ANALYSIS: ".readings." sensor readings on roof level. Average temperature: ".round(avg_temp,1)."°F. Peak: ".round(max_temp,1)."°F. Cross-reference with C4 thermal signatures — charges generate heat above 95°F."
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
disabled = 0
alert.track = 1
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 3600s
description = Monitors HVAC data for explosive-grade heat signatures and provides analysis hints. Players should check triggered alerts for guidance on identifying C4 charges.
