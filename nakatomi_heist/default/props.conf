# v2.4 — live game-session telemetry (HEC, JSON, no PII beyond user-supplied team_name).
# Field aliases below give the facilitator dashboards a stable schema even if the upstream
# JSON shape evolves. KV_MODE=json already auto-extracts these, but explicit EXTRACTs make
# behavior identical on Splunk Cloud Victoria/Polaris and Splunk Enterprise 9.x/10.x.
[nakatomi:session:event]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%z
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 16384
EXTRACT-team_code = "team_code":\s*"(?<team_code>[^"]*)"
EXTRACT-team_name = "team_name":\s*"(?<team_name>[^"]*)"
EXTRACT-session_id = "session_id":\s*"(?<session_id>[^"]*)"
EXTRACT-event_type = "event_type":\s*"(?<event_type>[^"]*)"
EXTRACT-difficulty = "difficulty":\s*"(?<difficulty>[^"]*)"
EXTRACT-mode = "mode":\s*"(?<mode>[^"]*)"
EXTRACT-act = "act":\s*(?<act>\d+)
EXTRACT-task_id = "task_id":\s*"(?<task_id>[^"]*)"
EXTRACT-task_name = "task_name":\s*"(?<task_name>[^"]*)"
EXTRACT-booth_id = "booth_id":\s*"(?<booth_id>[^"]*)"
EXTRACT-scenario = "scenario":\s*"(?<scenario>[^"]*)"
EXTRACT-outcome = "outcome":\s*"(?<outcome>[^"]*)"
EXTRACT-reason = "reason":\s*"(?<reason>[^"]*)"
EXTRACT-achievement_id = "achievement_id":\s*"(?<achievement_id>[^"]*)"
EXTRACT-score = "score":\s*(?<score>\d+)
EXTRACT-score_scaled = "score_scaled":\s*(?<score_scaled>\d+)
EXTRACT-elapsed_seconds = "elapsed_seconds":\s*(?<elapsed_seconds>\d+)
EXTRACT-completed_tasks = "completed_tasks":\s*(?<completed_tasks>\d+)
EXTRACT-total_tasks = "total_tasks":\s*(?<total_tasks>\d+)
EXTRACT-wrong_count = "wrong_count":\s*(?<wrong_count>\d+)
EXTRACT-hints_used = "hints_used":\s*(?<hints_used>\d+)
EXTRACT-hint_level = "hint_level":\s*(?<hint_level>\d+)
# v2.6 hint-token economy: spent counter is per-event (hint_token_spent),
# initial/spent/remaining roll-ups appear on session_end. Patterns are
# anchored on the JSON key so missing values don't pollute extracted fields.
EXTRACT-hint_tokens_initial = "hint_tokens_initial":\s*(?<hint_tokens_initial>\d+)
EXTRACT-hint_tokens_spent = "hint_tokens_spent":\s*(?<hint_tokens_spent>\d+)
EXTRACT-hint_tokens_remaining = "hint_tokens_remaining":\s*(?<hint_tokens_remaining>\d+)
EXTRACT-tokens_initial = "tokens_initial":\s*(?<tokens_initial>\d+)
EXTRACT-tokens_remaining = "tokens_remaining":\s*(?<tokens_remaining>\d+)
