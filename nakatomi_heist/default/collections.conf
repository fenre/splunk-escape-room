[vault_progress]
# v2.3 schema (preserved for backward compatibility with the original dashboard)
field.session_id = string
field.player_name = string
field.act = number
field.task = string
field.status = string
field.score = number
field.hints_used = number
field.wrong_codes = number
field.elapsed_seconds = number
field.difficulty = string
field.timestamp = time

# v2.4 — fields added for live facilitator board / multi-team booth play.
# All optional; older clients writing without them continue to work.
field.team_code = string
field.team_name = string
field.booth_id = string
field.scenario = string
field.mode = string
field.completed_tasks = number
field.total_tasks = number
field.last_task_id = string
field.reason = string
field.started_at = time
field.finished_at = time
field.ts = time
