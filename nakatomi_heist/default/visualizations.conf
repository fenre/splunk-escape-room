[nakatomi_vault_display]
label = Nakatomi Vault Display
description = CRT-style vault seal status display with animated LEDs and phosphor text
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | makeresults count=7 | streamstats count as seal | eval name=case(seal=1,"THE LOBBY",seal=2,"SECURING",seal=3,"TAKAGI",seal=4,"THE ROOF",seal=5,"THE FBI",seal=6,"BONDS",seal=7,"???"), status="LOCKED"

[nakatomi_terminal]
label = Nakatomi Terminal
description = CRT-style terminal event viewer with green/amber phosphor text and scanlines
default_height = 500
allow_user_selection = true
disabled = 0
search_fragment = index=nakatomi_access | head 20
